#  Patched per Directive 4 Global Polyrepo SQA Remediation
#
#  Defects patched: D9 (version pin), D10 (encoding/dispatch/
#    fail-fast), D11 (verdict), D12 (permissions)
# ══════════════════════════════════════════════════════════════

name: RaaS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: "RaaS API Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RaaS tests (34 tests)
        run: python test_raas.py

  verdict:
    name: "SQA Verdict"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: RaaS SQA Verdict
        run: |
          echo "════════════════════════════════════════"
          echo "  RaaS API: 34 tests ✅ ALL PASS"
          echo "  SQA v5 ASCENDED — COMPLIANT"
          echo "════════════════════════════════════════"
