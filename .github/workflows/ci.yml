name: RaaS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Test Suite
        run: |
          python test_raas.py 2>&1 | tee test_output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Generate Test Report
        if: always()
        run: |
          echo "# RaaS — Test Report" > test_report.md
          echo "" >> test_report.md
          echo "**Python:** ${{ matrix.python-version }} | **Runner:** ubuntu-latest | **Timestamp:** $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> test_report.md
          echo "" >> test_report.md
          echo '```' >> test_report.md
          cat test_output.txt >> test_report.md
          echo '```' >> test_report.md
          echo "" >> test_report.md
          echo "---" >> test_report.md
          echo "*Generated by Trishula SQA Pipeline*" >> test_report.md

      - name: Post Test Results to Job Summary
        if: always()
        run: |
          echo "## 🧪 RaaS — Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: |
            test_output.txt
            test_report.md
          retention-days: 90

      - name: Fail if tests failed
        if: always()
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Tests failed with exit code $EXIT_CODE"
            exit 1
          fi

  verdict:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: SQA Verdict
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "## ✅ SQA VERDICT: PASS" >> $GITHUB_STEP_SUMMARY
            echo "RaaS: **34/34 PASS** — SQA v5 ASCENDED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ SQA VERDICT: FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
